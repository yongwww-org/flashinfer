name: Build and Release AOT Wheels

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g., v1.2.3) - leave empty for test build'
        required: false
        type: string
      publish_pypi:
        description: 'Publish to PyPI'
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - 'flashinfer-aot-modules/**'
      - '.github/workflows/build_wheel.yml'
  push:
    branches: [main, master]
    tags:
      - 'v*'

env:
  FORCE_COLOR: 1

jobs:
  validate-tag:
    if: inputs.tag != '' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Determine tag
        id: get-tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Validate tag format
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([a-z0-9]+)?$ ]]; then
            echo "Error: Tag '$TAG' does not match expected format (e.g., v1.2.3 or v1.2.3rc1)"
            exit 1
          fi
          echo "✓ Tag format is valid: $TAG"

      - name: Extract version
        id: extract
        run: |
          TAG="${{ steps.get-tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.tag }}
          submodules: recursive

      - name: Verify version.txt
        run: |
          if [ -f "flashinfer-aot-modules/version.txt" ]; then
            VERSION_TXT=$(cat flashinfer-aot-modules/version.txt | tr -d '[:space:]')
            if [ "${{ steps.extract.outputs.version }}" != "$VERSION_TXT" ]; then
              echo "❌ ERROR: version.txt does not match tag!"
              echo "  Tag version: ${{ steps.extract.outputs.version }}"
              echo "  version.txt: $VERSION_TXT"
              exit 1
            fi
            echo "✓ version.txt matches tag version: $VERSION_TXT"
          fi

  build-x86_64:
    name: Build x86_64 - CUDA ${{ matrix.cuda_version }}
    runs-on: ubuntu-latest
    needs: [validate-tag]
    if: success() || needs.validate-tag.result == 'skipped'
    container:
      image: docker.io/flashinfer/flashinfer-ci-cu${{ matrix.cuda_tag }}:latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "12.6"
            cuda_tag: "126"
            cuda_arch_list: "7.5 8.0 8.9 9.0a"
          - cuda_version: "12.8"
            cuda_tag: "128"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 12.0a"
          - cuda_version: "12.9"
            cuda_tag: "129"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 10.3a 12.0a 12.1a"
          - cuda_version: "13.0"
            cuda_tag: "130"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 10.3a 12.0a 12.1a"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set version if release
        if: needs.validate-tag.outputs.version != ''
        run: |
          echo "${{ needs.validate-tag.outputs.version }}" > flashinfer-aot-modules/version.txt

      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install build wheel setuptools
          pip install cuda-python==12.9.0 pynvml

      - name: Build AOT wheel
        working-directory: flashinfer-aot-modules
        env:
          FLASHINFER_CUDA_ARCH_LIST: ${{ matrix.cuda_arch_list }}
          CUDA_VERSION: ${{ matrix.cuda_version }}
        run: |
          echo "Building AOT modules for CUDA ${{ matrix.cuda_version }}"
          echo "FLASHINFER_CUDA_ARCH_LIST=${{ matrix.cuda_arch_list }}"
          python3 -m build --wheel
          ls -lh dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cu${{ matrix.cuda_tag }}-x86_64
          path: flashinfer-aot-modules/dist/*.whl
          retention-days: 7

  build-aarch64:
    name: Build aarch64 - CUDA ${{ matrix.cuda_version }}
    runs-on: ubuntu-latest
    needs: [validate-tag]
    if: success() || needs.validate-tag.result == 'skipped'
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "12.6"
            cuda_tag: "126"
            cuda_arch_list: "7.5 8.0 8.9 9.0a"
          - cuda_version: "12.8"
            cuda_tag: "128"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 12.0a"
          - cuda_version: "12.9"
            cuda_tag: "129"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 10.3a 12.0a 12.1a"
          - cuda_version: "13.0"
            cuda_tag: "130"
            cuda_arch_list: "7.5 8.0 8.9 9.0a 10.0a 10.3a 12.0a 12.1a"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set version if release
        if: needs.validate-tag.outputs.version != ''
        run: |
          echo "${{ needs.validate-tag.outputs.version }}" > flashinfer-aot-modules/version.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -e FLASHINFER_CUDA_ARCH_LIST="${{ matrix.cuda_arch_list }}" \
            -e CUDA_VERSION="${{ matrix.cuda_version }}" \
            --workdir /workspace \
            --user root \
            docker.io/flashinfer/flashinfer-ci-cu${{ matrix.cuda_tag }}:latest \
            bash -c "
              python3 -m pip install --upgrade pip
              pip install build wheel setuptools
              pip install cuda-python==12.9.0 pynvml
              cd flashinfer-aot-modules
              echo 'Building AOT modules for CUDA ${{ matrix.cuda_version }} on aarch64'
              echo 'FLASHINFER_CUDA_ARCH_LIST=${{ matrix.cuda_arch_list }}'
              python3 -m build --wheel
              ls -lh dist/
              # Fix ownership for GitHub Actions
              chown -R $(stat -c '%u:%g' .) dist/
            "

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cu${{ matrix.cuda_tag }}-aarch64
          path: flashinfer-aot-modules/dist/*.whl
          retention-days: 7

  test-wheel:
    name: Test wheel - CUDA ${{ matrix.cuda_version }}
    needs: [build-x86_64]
    runs-on: ubuntu-latest
    container:
      image: docker.io/flashinfer/flashinfer-ci-cu${{ matrix.cuda_tag }}:latest
    strategy:
      matrix:
        include:
          - cuda_version: "12.9"
            cuda_tag: "129"
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheel-cu${{ matrix.cuda_tag }}-x86_64
          path: dist

      - name: Test installation
        run: |
          python3 -m pip install dist/*.whl
          python3 -c "import flashinfer_aot_modules; print('✓ Successfully imported flashinfer_aot_modules')"

  publish-pypi:
    name: Publish to PyPI
    needs: [build-x86_64, build-aarch64, test-wheel, validate-tag]
    runs-on: ubuntu-latest
    if: |
      needs.validate-tag.result == 'success' &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_pypi == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: false

      - name: Organize wheels
        run: |
          mkdir -p final_dist
          find dist -name "*.whl" -exec mv {} final_dist/ \;
          echo "Wheels to publish:"
          ls -lh final_dist/
          echo "Total: $(ls -1 final_dist/*.whl | wc -l) wheels"

      - name: Check wheels with twine
        run: |
          pip install twine
          twine check final_dist/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "Publishing to PyPI..."
          twine upload --verbose --non-interactive final_dist/*.whl
          echo "✓ Successfully published to PyPI"